<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Indian Bike Driving Game - A Three.js bike racing experience">
  <title>Bike Game - Indian Driving Prototype</title>
  
  <!-- Mobile Controls Styling - CORRECT PATH -->
  <link rel="stylesheet" href="./src/mobile-controls.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #gameContainer {
      width: 100%;
      height: 100%;
      display: block;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Loading screen */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      font-size: 18px;
      color: white;
    }

    /* HUD overlay */
    #hudContainer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <!-- Game Container -->
  <canvas id="game" width="1024" height="768"></canvas>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div>Loading Game...</div>
  </div>

  <!-- HUD Container -->
  <div id="hudContainer"></div>

  <!-- Mobile Controls Container -->
  <div class="mobile-controls">
    <!-- Joystick -->
    <div id="joystick">
      <div id="joystick-stick"></div>
    </div>

    <!-- Buttons Container -->
    <div class="mobile-buttons">
      <button id="brake-btn">BRAKE</button>
      <button id="nitro-btn">NITRO</button>
      <button id="camera-btn">CAM</button>
    </div>
  </div>

  <!-- Main Game Script -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
